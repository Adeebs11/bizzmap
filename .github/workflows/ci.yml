name: BizzMap CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: bizzmap_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo_mysql, zip, gd, intl
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Run Migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bizzmap_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force -v

      - name: Run Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bizzmap_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test -v
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
